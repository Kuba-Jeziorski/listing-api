<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="src/icons/favicon.ico" />
    <link rel="stylesheet" href="dist/style.css" />
    <script type="module" src="src/js/scripts.js"></script>
    <title>Listing API</title>
  </head>
  <body>
    <main>
      <section>
        <div id="loader"></div>
        <div id="filtering">
          <p>Filtruj listę produktów</p>
          <div class="select-wrapper">
            <select name="filter" id="filter"></select>
          </div>
        </div>
        <div id="errors">
          <div class="products-error" data-error="try">
            <p>
              Nastąpił problem z pobraniem danych. Prosimy spróbować później!
            </p>
          </div>
          <div class="products-error" data-error="catch">
            <p>
              Nastąpił problem z pobraniem danych. Prosimy spróbować później!
            </p>
          </div>
          <div class="products-error" data-error="no-products">
            <p>Żaden produkt nie posiada wybranej kategorii.</p>
          </div>
        </div>
        <div class="products-list-wrapper">
          <ul id="products-list"></ul>
        </div>
        <div id="pagination"></div>
      </section>
    </main>
    <div id="modal">
      <div class="wrapper">
        <div class="close"></div>
      </div>
    </div>
  </body>
</html>
